{% extends "base.html" %}
{% block title %}Budget {{ year }} — Suzorako{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;">
  <h2 style="margin:0;">Budget {{ year }}</h2>
  <div style="display:flex;gap:0.5rem;align-items:center;margin-left:auto;">
    <a href="/budget?year={{ year - 1 }}&period={{ period }}" style="text-decoration:none;">◀</a>
    <span>{{ year }}</span>
    <a href="/budget?year={{ year + 1 }}&period={{ period }}" style="text-decoration:none;">▶</a>
  </div>
</div>

<div
  id="budget-chart"
  data-url="/budget/chart-data?year={{ year }}&period={{ period }}"
  style="width:100%;height:300px;margin-bottom:1.5rem;">
</div>

<div
  id="budget-table-container"
  hx-get="/budget/table?year={{ year }}&period={{ period }}"
  hx-trigger="load">
  <p style="color:var(--pico-muted-color);">Chargement…</p>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/d3.min.js"></script>
<script src="/static/js/budget-chart.js"></script>
<script>
  const chartEl = document.getElementById('budget-chart');
  d3.json(chartEl.dataset.url).then(data => renderBudgetChart(data, chartEl));
</script>
{% endblock %}
