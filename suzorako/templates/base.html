<!doctype html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Suzorako{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/pico.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="/static/js/htmx.min.js"></script>
</head>
<body hx-boost="true">

<nav class="top-nav">
  <a href="/" class="brand">Suzorako</a>
  <a href="/accounts" {% if request.url.path.startswith('/accounts') %}class="active"{% endif %}>Comptes</a>
  <a href="/transactions/new" {% if request.url.path == '/transactions/new' %}class="active"{% endif %}>+ Saisie</a>
  <a href="/budget" {% if request.url.path.startswith('/budget') %}class="active"{% endif %}>Budget</a>
  <a href="/import" {% if request.url.path.startswith('/import') %}class="active"{% endif %}>Import</a>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
